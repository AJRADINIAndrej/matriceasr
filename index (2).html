<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrice de Criticité — MedicArgile SI</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Palette modernisée Deep Space / Cyber */
    --bg: #050608;
    --bg-gradient: radial-gradient(circle at 50% 0%, #111827 0%, #050608 70%);
    --surface: rgba(17, 24, 39, 0.65); /* Glassmorphism */
    --surface-hover: rgba(31, 41, 55, 0.85);
    --border: rgba(255, 255, 255, 0.08);
    --border-highlight: rgba(255, 255, 255, 0.15);
    
    --text: #f3f4f6;
    --muted: #9ca3af;
    --accent: #00f0ff;
    
    /* Couleurs de criticité plus vibrantes */
    --c1: #34d399;   /* Négligeable - Émeraude */
    --c2: #a3e635;   /* Faible - Lime */
    --c3: #fbbf24;   /* Modéré - Ambre */
    --c4: #f97316;   /* Élevé - Orange */
    --c5: #ef4444;   /* Critique - Rouge */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    background-image: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  header {
    padding: 50px 60px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }

  .header-left .label {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: inline-block;
    padding: 4px 10px;
    background: rgba(0, 240, 255, 0.1);
    border: 1px solid rgba(0, 240, 255, 0.2);
    border-radius: 4px;
  }

  header h1 {
    font-size: clamp(32px, 4vw, 48px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    text-shadow: 0 0 40px rgba(255,255,255,0.1);
  }

  header h1 span { 
    color: transparent;
    background: linear-gradient(90deg, var(--text), var(--muted));
    -webkit-background-clip: text;
  }

  .header-meta {
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    line-height: 1.8;
    background: var(--surface);
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  /* ── SUMMARY CARDS ─────────────────────────────────── */
  .summary {
    display: flex;
    gap: 20px;
    padding: 0 60px 30px;
    flex-wrap: wrap;
  }

  .summary-card {
    flex: 1;
    min-width: 120px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-top: 2px solid currentColor;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
  }

  .summary-card:hover {
    transform: translateY(-5px);
    background: var(--surface-hover);
    box-shadow: 0 15px 40px -10px currentColor;
  }

  .summary-num {
    font-weight: 800;
    font-size: 36px;
    line-height: 1;
    margin-bottom: 8px;
  }

  .summary-label {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── STATS BAR ──────────────────────────────────────── */
  .stats-bar {
    display: flex;
    gap: 4px;
    padding: 0 60px;
    margin-bottom: 40px;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
  }

  .stats-segment {
    height: 100%;
    transition: flex 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: inset 0 2px 4px rgba(255,255,255,0.3);
  }

  /* ── CONTROLS ───────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 60px 30px;
    flex-wrap: wrap;
  }

  .controls span {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .filter-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(8px);
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .filter-btn:hover {
    color: var(--text);
    border-color: var(--border-highlight);
    background: rgba(255,255,255,0.05);
  }

  .filter-btn.active {
    background: var(--bg);
    box-shadow: inset 0 0 20px currentColor;
  }

  .filter-btn[data-sev="1"].active { border-color: var(--c1); color: var(--c1); }
  .filter-btn[data-sev="2"].active { border-color: var(--c2); color: var(--c2); }
  .filter-btn[data-sev="3"].active { border-color: var(--c3); color: var(--c3); }
  .filter-btn[data-sev="4"].active { border-color: var(--c4); color: var(--c4); }
  .filter-btn[data-sev="5"].active { border-color: var(--c5); color: var(--c5); }

  /* ── MATRIX SECTION ───────────────────────────────────── */
  .grid-section {
    padding: 0 60px 40px;
  }

  .matrix-wrapper {
    display: flex;
    gap: 30px;
    align-items: flex-start;
    background: var(--surface);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .y-label {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
    margin-top: 40px;
  }

  .matrix-inner { flex: 1; }

  .x-labels, .matrix-row {
    display: grid;
    grid-template-columns: 140px repeat(5, 1fr);
    gap: 8px;
    align-items: center;
  }

  .x-labels { margin-bottom: 8px; }

  .x-labels > div {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
  }

  .x-labels > div:first-child { text-align: left; }

  .matrix-grid {
    display: grid;
    gap: 8px;
  }

  .row-label {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--text);
    text-align: right;
    padding-right: 15px;
  }

  .cell {
    border-radius: 8px;
    aspect-ratio: 1 / 0.85;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: currentColor;
    opacity: 0.1;
    transition: opacity 0.3s;
  }

  .cell:hover {
    transform: scale(1.05) translateY(-2px);
    z-index: 10;
    box-shadow: 0 10px 20px -5px currentColor;
    border-color: currentColor;
  }

  .cell:hover::before { opacity: 0.2; }

  .cell.dimmed { filter: opacity(0.2) grayscale(0.5); }

  .cell-count {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1;
    position: relative;
    z-index: 1;
  }

  .cell-dots {
    position: absolute;
    inset: 0;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .cell:hover .cell-dots { opacity: 1; }
  .cell:hover .cell-count { opacity: 0; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 0 5px white;
  }

  .lvl-1 { color: var(--c1); }
  .lvl-2 { color: var(--c2); }
  .lvl-3 { color: var(--c3); }
  .lvl-4 { color: var(--c4); }
  .lvl-5 { color: var(--c5); }

  .x-axis-label {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 15px;
    padding-left: 140px;
  }

  /* ── RISK LIST ───────────────────────────────────────── */
  .risk-section {
    padding: 0 60px 80px;
  }

  .section-title {
    font-family: 'Fira Code', monospace;
    font-size: 14px;
    color: var(--text);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border-highlight), transparent);
  }

  .risk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }

  .risk-card {
    background: var(--surface);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .risk-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: currentColor;
    box-shadow: 0 0 15px currentColor;
  }

  .risk-card:hover {
    background: var(--surface-hover);
    transform: translateY(-4px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    border-color: var(--border-highlight);
  }

  .risk-card.hidden { display: none; }

  .risk-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 15px;
    margin-bottom: 15px;
  }

  .risk-id {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 4px 8px;
    border-radius: 4px;
  }

  .risk-name {
    font-weight: 700;
    font-size: 16px;
    line-height: 1.3;
    flex: 1;
    color: var(--text);
  }

  .risk-badge {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .score-badge {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 22px;
    line-height: 1;
  }

  .badge {
    font-family: 'Fira Code', monospace;
    font-size: 9px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .risk-metrics {
    display: flex;
    gap: 15px;
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 1px solid var(--border);
  }

  .metric { flex: 1; }

  .metric-label {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .metric-bar {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }

  .metric-fill {
    height: 100%;
    border-radius: 3px;
    background: currentColor;
    box-shadow: 0 0 10px currentColor;
    transition: width 1s cubic-bezier(0.25,1,0.5,1);
  }

  .risk-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 15px;
    flex-grow: 1;
  }

  .risk-action {
    font-size: 12px;
    background: rgba(255,255,255,0.03);
    padding: 12px;
    border-radius: 8px;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.5;
    border-left: 2px solid currentColor;
  }

  .risk-action::before {
    content: '→';
    font-weight: 800;
    color: currentColor;
  }

  /* ── MODAL (POPUP) ───────────────────────────────────── */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    padding: 20px;
  }

  .modal-bg.open { opacity: 1; pointer-events: all; }

  .modal {
    background: rgba(17, 24, 39, 0.95);
    border: 1px solid var(--border-highlight);
    border-radius: 20px;
    padding: 40px;
    max-width: 600px;
    width: 100%;
    transform: translateY(30px) scale(0.95);
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: currentColor;
    box-shadow: 0 0 20px currentColor;
  }

  .modal-bg.open .modal { transform: none; }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    background: rgba(255,255,255,0.05);
    border: none;
    color: var(--text);
    font-size: 18px;
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-close:hover { background: rgba(255,255,255,0.15); transform: rotate(90deg); }

  .modal-score-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 4px solid currentColor;
    margin: 0 auto 25px;
    font-weight: 800;
    font-size: 32px;
    box-shadow: 0 0 30px currentColor;
    background: rgba(0,0,0,0.2);
  }

  .modal h2 {
    font-size: 24px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 8px;
    color: var(--text);
  }

  .modal-level {
    text-align: center;
    font-family: 'Fira Code', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 30px;
    color: var(--muted);
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-bottom: 25px;
  }

  .modal-stat {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
  }

  .modal-stat-label {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .modal-stat-value {
    font-weight: 800;
    font-size: 24px;
    color: currentColor;
  }

  .modal-section-title {
    font-family: 'Fira Code', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 5px;
  }

  .modal-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 25px;
  }

  .modal-action-box {
    background: rgba(255,255,255,0.05);
    border-left: 4px solid currentColor;
    border-radius: 0 10px 10px 0;
    padding: 18px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }

  /* ── RESPONSIVE ─────────────────────────────────────── */
  @media (max-width: 900px) {
    header, .controls, .grid-section, .risk-section, .stats-bar, .summary {
      padding-left: 20px; padding-right: 20px;
    }
    .x-labels, .matrix-row { grid-template-columns: 90px repeat(5, 1fr); gap: 4px; }
    .row-label { font-size: 9px; padding-right: 5px; }
    .x-axis-label { padding-left: 90px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="label">// Mission 3 — Sécurisation SI</div>
    <h1>Matrice de <span>Criticité</span></h1>
  </div>
  <div class="header-meta">
    <strong>MedicArgile</strong> · Projet Collaboratif<br>
    Andrej · Edip · Alexandre<br>
    Mars 2026 · CESI
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="summary" id="summaryCards"></div>

<div class="controls">
  <span>FILTRER :</span>
  <button class="filter-btn active" data-sev="0">Vue Globale</button>
  <button class="filter-btn" data-sev="5">Critique</button>
  <button class="filter-btn" data-sev="4">Élevé</button>
  <button class="filter-btn" data-sev="3">Modéré</button>
  <button class="filter-btn" data-sev="2">Faible</button>
  <button class="filter-btn" data-sev="1">Négligeable</button>
</div>

<div class="grid-section">
  <div class="matrix-wrapper">
    <div class="y-label">IMPACT</div>
    <div class="matrix-inner">
      <div class="x-labels">
        <div></div>
        <div>1 — Rare</div>
        <div>2 — Improbable</div>
        <div>3 — Possible</div>
        <div>4 — Probable</div>
        <div>5 — Quasi-certain</div>
      </div>
      <div class="matrix-grid" id="matrixGrid"></div>
      <div class="x-axis-label">PROBABILITÉ →</div>
    </div>
  </div>
</div>

<div class="risk-section">
  <div class="section-title">Registre Détaillé des Risques</div>
  <div class="risk-grid" id="riskGrid"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
/* ─── DATA ──────────────────────────────────────────────────── */
const RISKS = [
  { id: "R01", name: "Cyberattaque / Ransomware", category: "Cybersécurité", prob: 4, impact: 5, desc: "Compromission du SI via un ransomware ciblant les secrets industriels de MedicArgile ou les données de recherche pharmaceutique.", action: "Déploiement ESET Endpoint Security, GPO AppLocker, MFA Entra ID P1, BitLocker, sauvegardes immuables Veeam (AES-256)." },
  { id: "R02", name: "Panne du site principal (Bâtiment B)", category: "Disponibilité", prob: 3, impact: 5, desc: "Défaillance matérielle ou incendie dans la salle serveur du Bâtiment B entraînant l'arrêt de la production 24h/24.", action: "Architecture bi-sites redondante (Bâtiment B + Labo R&D), réplication IPsec Veeam, cluster Stormshield HA." },
  { id: "R03", name: "Indisponibilité de la supervision industrielle", category: "Production", prob: 3, impact: 5, desc: "Perte de visibilité sur les capteurs de la chaîne de production. Arrêt potentiel des deux unités en mode 3×8.", action: "Proxmox avec haute disponibilité, OS Linux dédié sur VM isolée, réplication temps réel." },
  { id: "R04", name: "Rupture de la liaison inter-sites", category: "Réseau", prob: 3, impact: 4, desc: "Interruption du tunnel VPN IPsec entre Bâtiment B et Laboratoire R&D, compromettant la réplication.", action: "Multi-homing WAN (Orange + SFR + passerelle 5G), agrégation VLT sur switches Aruba CX." },
  { id: "R05", name: "Panne d'alimentation électrique", category: "Disponibilité", prob: 4, impact: 4, desc: "Coupure secteur imprévue entraînant la perte des serveurs et corruption potentielle de données.", action: "Onduleurs Eaton 9PX 3000W (double conversion) pour serveurs, Eaton Ellipse PRO pour postes." },
  { id: "R06", name: "Phishing / Ingénierie sociale", category: "Cybersécurité", prob: 4, impact: 3, desc: "Ouverture de mails frauduleux par un utilisateur, vol d'identifiants professionnels.", action: "Formation obligatoire, charte informatique, interdiction des comptes personnels, filtrage antispam Stormshield." },
  { id: "R07", name: "Exfiltration de secrets industriels", category: "Cybersécurité", prob: 2, impact: 5, desc: "Vol des formules pharmaceutiques via un support amovible ou un accès distant non contrôlé.", action: "GPO blocage USB, réseau R&D isolé (VLAN), accès conditionnel Entra ID P1." },
  { id: "R08", name: "Défaillance du NAS / Perte de données", category: "Données", prob: 2, impact: 5, desc: "Corruption ou panne multiple du NAS Synology DS925+ (RAID 5), perte irréversible de données.", action: "Règle 3-2-1 : NAS RAID5 local + réplication Labo + Cloud Azure/AWS certifié HDS." },
  { id: "R09", name: "Dépassement de budget", category: "Gestion", prob: 3, impact: 3, desc: "Augmentation des coûts matériels ou de licences en cours de projet.", action: "Suivi tableau de bord KPI, réévaluation budgétaire continue." },
  { id: "R10", name: "Retard de livraison des équipements", category: "Gestion", prob: 3, impact: 3, desc: "Délais d'approvisionnement (Dell, Aruba) non respectés, bloquant le déploiement.", action: "Commandes anticipées, fournisseurs alternatifs, suivi jalons COPIL." },
  { id: "R11", name: "Non-conformité HDS / ISO 27001", category: "Conformité", prob: 2, impact: 4, desc: "Hébergement de données hors périmètre certifié HDS pour une entreprise pharmaceutique.", action: "Cloud certifié HDS, chiffrement AES-256, traçabilité des accès, alignement ISO 27001." },
  { id: "R12", name: "Résistance au changement", category: "Humain", prob: 4, impact: 2, desc: "Refus d'adoption des nouveaux outils (MFA, M365) par les 66 collaborateurs.", action: "Plan de formation, support helpdesk GLPI, référents métier." },
  { id: "R13", name: "Interruption de la VoIP (3CX)", category: "Disponibilité", prob: 2, impact: 3, desc: "Défaillance du serveur 3CX bloquant la communication interne et externe.", action: "PCA VoIP : basculement automatique vers Microsoft Teams, téléphones Snom profil secours." },
  { id: "R14", name: "Compromission accès distants (VPN)", category: "Cybersécurité", prob: 3, impact: 4, desc: "Accès VPN non autorisé depuis commerciaux nomades, exploitation d'identifiants.", action: "MFA obligatoire sur VPN, accès conditionnel par profil, journalisation." },
  { id: "R15", name: "Défaillance du pare-feu Stormshield", category: "Réseau", prob: 2, impact: 4, desc: "Panne du nœud actif du cluster Stormshield, exposition à Internet.", action: "Cluster HA (Active/Passive), basculement transparent." },
  { id: "R16", name: "Obsolescence accélérée", category: "Matériel", prob: 2, impact: 2, desc: "Vieillissement prématuré du matériel faute de maintenance préventive.", action: "Contrats de garantie H24, GLPI pour inventaire, politique de renouvellement." }
];

const LEVEL_NAMES = ['', 'Négligeable', 'Faible', 'Modéré', 'Élevé', 'Critique'];
const LEVEL_COLORS = ['', 'var(--c1)', 'var(--c2)', 'var(--c3)', 'var(--c4)', 'var(--c5)'];

function getLevel(score) {
  if (score <= 4) return 1;
  if (score <= 8) return 2;
  if (score <= 12) return 3;
  if (score <= 19) return 4;
  return 5;
}

function getScore(r) { return r.prob * r.impact; }

/* ─── BUILD MATRIX ─────────────────────────────────────────── */
function buildMatrix() {
  const grid = document.getElementById('matrixGrid');
  const cells = {};
  for (let i = 5; i >= 1; i--) {
    for (let p = 1; p <= 5; p++) {
      cells[`${i}_${p}`] = [];
    }
  }
  RISKS.forEach(r => cells[`${r.impact}_${r.prob}`].push(r));

  const rowLabels = ['5 — Catastrophique', '4 — Majeur', '3 — Modéré', '2 — Mineur', '1 — Insignifiant'];

  for (let i = 5; i >= 1; i--) {
    const row = document.createElement('div');
    row.className = 'matrix-row';
    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.textContent = rowLabels[5 - i];
    row.appendChild(lbl);

    for (let p = 1; p <= 5; p++) {
      const score = i * p;
      const lv = getLevel(score);
      const list = cells[`${i}_${p}`];
      const cell = document.createElement('div');
      cell.className = `cell lvl-${lv}`;
      cell.dataset.impact = i;
      cell.dataset.prob = p;
      cell.style.color = LEVEL_COLORS[lv];

      const countEl = document.createElement('div');
      countEl.className = 'cell-count';
      countEl.textContent = list.length || '';

      const dotsEl = document.createElement('div');
      dotsEl.className = 'cell-dots';
      list.forEach(() => {
        const d = document.createElement('div');
        d.className = 'dot';
        dotsEl.appendChild(d);
      });

      cell.appendChild(countEl);
      cell.appendChild(dotsEl);

      if (list.length > 0) {
        cell.addEventListener('click', () => filterByCellClick(i, p));
        cell.title = `Cliquez pour voir les ${list.length} risques liés`;
      }
      row.appendChild(cell);
    }
    grid.appendChild(row);
  }
}

/* ─── FILTRES ─────────────────────────────────────────── */
function filterByCellClick(impact, prob) {
  const riskIds = RISKS.filter(r => r.impact === impact && r.prob === prob).map(r => r.id);
  document.querySelectorAll('.risk-card').forEach(card => {
    card.classList.toggle('hidden', !riskIds.includes(card.dataset.id));
  });
  document.querySelectorAll('.cell').forEach(c => {
    c.classList.toggle('dimmed', !(+c.dataset.impact === impact && +c.dataset.prob === prob));
  });
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
}

/* ─── RISK CARDS ──────────────────────────────────────── */
function buildRiskCards() {
  const grid = document.getElementById('riskGrid');
  const sorted = [...RISKS].sort((a, b) => getScore(b) - getScore(a));

  sorted.forEach(r => {
    const score = getScore(r);
    const lv = getLevel(score);
    const color = LEVEL_COLORS[lv];

    const card = document.createElement('div');
    card.className = 'risk-card';
    card.dataset.id = r.id;
    card.dataset.sev = lv;
    card.style.color = color;

    card.innerHTML = `
      <div class="risk-header">
        <div class="risk-id">${r.id}</div>
        <div class="risk-badge">
          <span class="badge">${r.category}</span>
          <span class="score-badge">${score}</span>
        </div>
      </div>
      <div class="risk-name">${r.name}</div>
      <div class="risk-metrics">
        <div class="metric">
          <div class="metric-label"><span>Impact</span> <span>${r.impact}/5</span></div>
          <div class="metric-bar"><div class="metric-fill" style="width:${r.impact*20}%"></div></div>
        </div>
        <div class="metric">
          <div class="metric-label"><span>Probabilité</span> <span>${r.prob}/5</span></div>
          <div class="metric-bar"><div class="metric-fill" style="width:${r.prob*20}%"></div></div>
        </div>
      </div>
      <div class="risk-desc">${r.desc}</div>
      <div class="risk-action">${r.action}</div>
    `;

    card.addEventListener('click', () => openModal(r));
    grid.appendChild(card);
  });
}

/* ─── MODAL ─────────────────────────────────────────────────── */
function openModal(r) {
  const score = getScore(r);
  const lv = getLevel(score);
  const color = LEVEL_COLORS[lv];
  const modal = document.getElementById('modal');
  modal.style.color = color;
  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()" aria-label="Fermer">✕</button>
    <div class="modal-score-ring">${score}</div>
    <h2>${r.name}</h2>
    <div class="modal-level">${LEVEL_NAMES[lv]} · ${r.category}</div>
    <div class="modal-grid">
      <div class="modal-stat">
        <div class="modal-stat-label">Impact</div>
        <div class="modal-stat-value">${r.impact}/5</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-label">Probabilité</div>
        <div class="modal-stat-value">${r.prob}/5</div>
      </div>
    </div>
    <div class="modal-section-title">Description</div>
    <div class="modal-text">${r.desc}</div>
    <div class="modal-section-title">Mesures de traitement</div>
    <div class="modal-action-box">${r.action}</div>
  `;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalBg') || e.currentTarget?.classList?.contains('modal-close')) {
    document.getElementById('modalBg').classList.remove('open');
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({target: document.getElementById('modalBg')}); });

/* ─── FILTERS & SUMMARY ────────────────────────────────────────── */
function initFiltersAndSummary() {
  const counts = [0, 0, 0, 0, 0, 0]; 
  RISKS.forEach(r => { counts[0]++; counts[getLevel(getScore(r))]++; });

  // Buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sev = +btn.dataset.sev;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('dimmed'));
      document.querySelectorAll('.risk-card').forEach(card => {
        card.classList.toggle('hidden', sev !== 0 && +card.dataset.sev !== sev);
      });
    });
  });

  // Summary Cards
  const items = [
    {label: 'Total Risques', num: counts[0], color: 'var(--text)', sev: 0},
    {label: 'Critique', num: counts[5], color: 'var(--c5)', sev: 5},
    {label: 'Élevé', num: counts[4], color: 'var(--c4)', sev: 4},
    {label: 'Modéré', num: counts[3], color: 'var(--c3)', sev: 3},
    {label: 'Faible', num: counts[2], color: 'var(--c2)', sev: 2},
    {label: 'Négligeable', num: counts[1], color: 'var(--c1)', sev: 1},
  ];

  const container = document.getElementById('summaryCards');
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'summary-card';
    card.style.color = item.color;
    card.innerHTML = `<div class="summary-num">${item.num}</div><div class="summary-label">${item.label}</div>`;
    card.addEventListener('click', () => document.querySelector(`.filter-btn[data-sev="${item.sev}"]`).click());
    container.appendChild(card);
  });

  // Stats Bar
  const bar = document.getElementById('statsBar');
  [5,4,3,2,1].forEach(i => {
    if (counts[i] > 0) {
      const seg = document.createElement('div');
      seg.className = 'stats-segment';
      seg.style.flex = counts[i];
      seg.style.background = LEVEL_COLORS[i];
      bar.appendChild(seg);
    }
  });
}

buildMatrix();
buildRiskCards();
initFiltersAndSummary();
</script>
</body>
